<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Antigravity Premium Loader</title>
    <style>
        :root {
            --gold-primary: #D4AF37;
            --gold-glow: rgba(212, 175, 55, 0.4);
            --bg-deep: #050505;
            --bg-charcoal: #0a0a0a;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-deep);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        /* Centered Loader Wrapper */
        .loader-wrapper {
            position: relative;
            width: 300px;
            height: 300px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Radial Background Glow */
        .background-glow {
            position: absolute;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(212, 175, 55, 0.08) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        /* Main Circular Container */
        .loader-container {
            position: relative;
            width: 200px;
            height: 200px;
            z-index: 1;
        }

        /* Outer Rotating Ring */
        .outer-ring {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 1px solid rgba(212, 175, 55, 0.1);
            animation: rotate 15s linear infinite;
        }

        /* Particle Stars */
        .particle {
            position: absolute;
            width: 3px;
            height: 3px;
            background: var(--gold-primary);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--gold-primary);
            animation: pulse-particle 3s ease-in-out infinite;
        }

        /* Geometric Elements */
        .geometric-element {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 2px;
            height: 40px;
            background: linear-gradient(to bottom, transparent, var(--gold-primary), transparent);
            transform-origin: center -60px;
            animation: elegant-rotate 8s cubic-bezier(0.4, 0, 0.2, 1) infinite;
            filter: drop-shadow(0 0 5px var(--gold-glow));
        }

        /* Smooth Rotation & Pulse */
        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @keyframes elegant-rotate {
            0% { 
                transform: translate(-50%, -50%) rotate(0deg) scaleY(1);
                opacity: 0.3;
            }
            50% { 
                transform: translate(-50%, -50%) rotate(180deg) scaleY(1.5);
                opacity: 1;
            }
            100% { 
                transform: translate(-50%, -50%) rotate(360deg) scaleY(1);
                opacity: 0.3;
            }
        }

        @keyframes pulse-particle {
            0%, 100% { transform: scale(1); opacity: 0.4; }
            50% { transform: scale(1.5); opacity: 1; }
        }

        /* Inner Glow */
        .inner-core {
            position: absolute;
            width: 40px;
            height: 40px;
            background: var(--gold-primary);
            border-radius: 50%;
            filter: blur(8px);
            opacity: 0.2;
            animation: core-pulse 4s ease-in-out infinite;
        }

        @keyframes core-pulse {
            0%, 100% { transform: scale(1); opacity: 0.1; }
            50% { transform: scale(1.8); opacity: 0.3; }
        }

        /* Floating Light Dots */
        .floating-dots {
            position: absolute;
            width: 100%;
            height: 100%;
            animation: rotate 20s linear infinite reverse;
        }

        .dot {
            position: absolute;
            width: 2px;
            height: 2px;
            background: var(--gold-primary);
            border-radius: 50%;
            opacity: 0.5;
        }

        /* Branding Text */
        .loading-text {
            position: absolute;
            bottom: -60px;
            font-size: 0.75rem;
            letter-spacing: 0.4em;
            color: var(--gold-primary);
            text-transform: uppercase;
            font-weight: 300;
            opacity: 0.6;
            animation: text-glow 3s ease-in-out infinite;
        }

        @keyframes text-glow {
            0%, 100% { opacity: 0.4; text-shadow: 0 0 0px var(--gold-glow); }
            50% { opacity: 0.8; text-shadow: 0 0 10px var(--gold-glow); }
        }
    </style>
</head>
<body>

    <div class="background-glow"></div>

    <div class="loader-wrapper">
        <div class="inner-core"></div>
        <div class="outer-ring"></div>
        
        <div class="loader-container">
            <!-- Geometric Elements - Generated by JS for precision -->
            <div id="elements-container"></div>
        </div>

        <div class="floating-dots" id="dots-container"></div>

        <div class="loading-text">Antigravity AI</div>
    </div>

    <script>
        const container = document.getElementById('elements-container');
        const dotsContainer = document.getElementById('dots-container');
        const count = 12;
        const dotsCount = 20;

        // Create geometric thin lines
        for (let i = 0; i < count; i++) {
            const el = document.createElement('div');
            el.className = 'geometric-element';
            el.style.transform = `translate(-50%, -50%) rotate(${i * (360 / count)}deg)`;
            el.style.animationDelay = `${i * 0.1}s`;
            container.appendChild(el);
        }

        // Create floating background particles
        for (let i = 0; i < dotsCount; i++) {
            const dot = document.createElement('div');
            dot.className = 'dot';
            const radius = 100 + Math.random() * 50;
            const angle = Math.random() * Math.PI * 2;
            dot.style.left = `${100 + Math.cos(angle) * radius}px`;
            dot.style.top = `${100 + Math.sin(angle) * radius}px`;
            dot.style.opacity = Math.random();
            dotsContainer.appendChild(dot);
        }
    </script>
</body>
</html>
