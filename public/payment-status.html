<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Status - EFV™</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            background: #000;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-family: 'Inter', sans-serif;
        }

        .status-container {
            text-align: center;
            background: rgba(255, 255, 255, 0.05);
            padding: 40px;
            border-radius: 20px;
            border: 1px solid rgba(255, 211, 105, 0.2);
            max-width: 400px;
            width: 90%;
        }

        .loader {
            font-size: 3rem;
            color: #FFD369;
            margin-bottom: 20px;
        }

        h2 {
            margin-bottom: 10px;
            color: #FFD369;
        }

        p {
            opacity: 0.7;
            line-height: 1.6;
        }

        .btn {
            display: inline-block;
            margin-top: 25px;
            padding: 12px 25px;
            background: #FFD369;
            color: #000;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 700;
            transition: 0.3s;
        }

        .btn:hover {
            background: #fff;
        }

        .error-icon {
            color: #ff4d4d;
        }

        .success-icon {
            color: #4caf50;
        }
    </style>
</head>

<body>
    <div class="status-container" id="status-box">
        <div class="loader"><i class="fas fa-spinner fa-spin"></i></div>
        <h2>Processing...</h2>
        <p>Please do not refresh or close this window. We are verifying your payment status.</p>
    </div>

    <script src="js/api-config.js"></script>
    <script>
        const API_BASE = (typeof CONFIG !== 'undefined') ? CONFIG.API_BASE_URL : 'http://localhost:8080';

        async function verify() {
            const urlParams = new URLSearchParams(window.location.search);
            const order_id = urlParams.get('order_id');
            const statusBox = document.getElementById('status-box');

            if (!order_id) {
                statusBox.innerHTML = `
                    <div class="loader error-icon"><i class="fas fa-times-circle"></i></div>
                    <h2>Invalid Session</h2>
                    <p>We couldn't find your order details. Please contact support.</p>
                    <a href="marketplace.html" class="btn">Return to Store</a>
                `;
                return;
            }

            try {
                const token = localStorage.getItem('authToken');
                const shippingAddress = JSON.parse(localStorage.getItem('shippingAddress'));
                const directCheckout = JSON.parse(localStorage.getItem('directCheckout'));
                const cart = JSON.parse(localStorage.getItem('efv_cart')) || [];

                const items = directCheckout ? (Array.isArray(directCheckout) ? directCheckout : [directCheckout]) : cart;

                const response = await fetch(`${API_BASE}/api/orders/verify-cashfree`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({
                        order_id: order_id,
                        customer: shippingAddress,
                        items: items.map(i => ({ productId: i.id || i.productId, quantity: i.quantity }))
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    // Success
                    localStorage.removeItem('efv_cart');
                    localStorage.removeItem('directCheckout');
                    localStorage.removeItem('shippingAddress');

                    statusBox.innerHTML = `
                        <div class="loader success-icon"><i class="fas fa-check-circle"></i></div>
                        <h2>Payment Successful!</h2>
                        <p>Thank you for your purchase. Your order <b>${data.order.orderId}</b> has been placed successfully.</p>
                        <a href="profile.html?tab=orders" class="btn">View My Orders</a>
                    `;
                } else {
                    throw new Error(data.message || 'Verification Failed');
                }
            } catch (error) {
                statusBox.innerHTML = `
                    <div class="loader error-icon"><i class="fas fa-times-circle"></i></div>
                    <h2>Payment Failed</h2>
                    <p>${error.message}. If money was deducted, please contact support@uwo24.com with Order ID: ${order_id}</p>
                    <a href="checkout.html" class="btn">Go Back</a>
                `;
            }
        }

        window.onload = verify;
    </script>
</body>

</html>
